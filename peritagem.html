<!DOCTYPE html>
<!--
peritagem.html — 11/07/2026 — Sprint F: form_uid + envio robusto + fotos com etiqueta própria
  - Novo form_uid (pgpUid(), 1x por sessão) enviado em saveFormulario — GAS
    (v68) deduplica reenvios sem duplicar a tarefa concluída.
  - enviar() checa a resposta real do GAS (status==='ok') antes de considerar
    o envio bem-sucedido; falha mostra o motivo real via toast (mantido o
    catch existente).
  - Modo avulso (sem os_id): mensagem final agora deixa explícito que os
    dados do formulário NÃO ficam no sistema, só as fotos no Drive.
  - Upload de foto renomeado 'salvarFotoForm08'→'salvarFotoForm', com
    categoria:'foto_'+tipoForm/entity_type:tipoForm no payload (GAS mantém
    'salvarFotoForm08' como case alias da mesma função).
  - tecnico_id/tecnico_nome agora usam a sessão (proper_session) como
    fallback, sem sobrescrever valor já digitado no formulário.
  - Nenhum ID/data-key de UI renomeado. form09/form10 não tocados.

  Peritagem — Form 09 (Mecânica / "FORM03") e Form 10 (Elétrica / "FORM04").
  Motor data-driven a partir de ESPEC_Form09_Form10_peritagem.md. Um arquivo,
  dois esquemas — selecione por ?tipo=09 ou ?tipo=10.
  Integração idêntica ao form08: ?os_id=&tarefa_id= → grava em FORMULARIOS com
  tipo_formulario=form09|form10 (o GAS fecha auto:form09|auto:form10) e sobe fotos
  ao Drive via salvarFotoForm08. ZERO mudança de GAS.

  Defaults aplicados nas 4 dúvidas da ESPEC (Fernando ajusta depois):
   1) Gateway do Form09 ramifica por tipo de compressor (parafuso/pistão) — mantido.
   2) Assinatura = nome do responsável + carimbo no PDF (sem canvas de assinatura).
   3) Análise de óleo = só "amostra coletada" (sem campos de laudo).
   4) Nenhuma seção extra além das da ESPEC.
-->

    <label>Validade da proposta</label><input type="text" id="orc_validade" placeholder="Ex.: 15 dias">`, true);
  // Observações
  h += card('obs','E — Observações e recomendações', `<textarea id="o_obs" placeholder="Texto livre"></textarea>`, true);
  // Parecer
  h += card('par','F — Parecer técnico', `
    <label>Parecer</label><div class="pills" id="parPills">${SC.parecer.opts.map(o=>`<button onclick="setPar('parecer','${esc(o)}',this)">${o}</button>`).join('')}</div>
    <label>Urgência</label><div class="pills" id="urgPills">${URGENCIAS.map(o=>`<button onclick="setPar('urgencia','${esc(o)}',this)">${o}</button>`).join('')}</div>
    <label>Assinatura do responsável (nome)</label><input type="text" id="p_assinatura">`, false);
  document.getElementById('form').innerHTML = h;
  applyGwVisibility();
}
function card(id,title,body,collapsed,attrs){
  return `<div class="card ${collapsed?'collapsed':''}" id="card_${id}" ${attrs||''}>
    <div class="card-h" onclick="this.parentElement.classList.toggle('collapsed')"><span>${title}</span><span>▾</span></div>
    <div class="card-b">${body}</div></div>`;
}
function renderItem(it){
  let ctrl='';
  if (it.c==='sn'||it.c==='snnt'){
    const opts = it.c==='snnt' ? [['Sim','sim'],['Não','nao'],['N/A','na'],['NT','nt']] : [['Sim','sim'],['Não','nao'],['N/A','na']];
    ctrl = `<div class="pills" data-k="${it.k}">${opts.map(([l,v])=>`<button class="${v}" onclick="setItem('${it.k}','${v}',this)">${l}</button>`).join('')}</div>`;
  } else if (it.c==='escala'){
    ctrl = `<div class="pills" data-k="${it.k}">${[['Bom','bom'],['Regular','regular'],['Ruim','ruim']].map(([l,v])=>`<button onclick="setItem('${it.k}','${v}',this)">${l}</button>`).join('')}</div>`;
  } else if (it.c==='escolha'){
    ctrl = `<div class="pills" data-k="${it.k}">${it.opts.map(o=>`<button onclick="setItem('${it.k}','${esc(o)}',this)">${o}</button>`).join('')}</div>`;
  } else if (it.c==='med'){
    ctrl = `<div class="med"><input type="number" step="any" onchange="setItem('${it.k}',this.value)"><span class="u">${it.unit||''}</span></div>`;
  } else if (it.c==='texto'){
    ctrl = `<textarea onchange="setItem('${it.k}',this.value)"></textarea>`;
  } else if (it.c==='foto'){
    state.fotos[it.k]=state.fotos[it.k]||[];
    ctrl = `<button class="btn-foto no-print" onclick="pickPhoto('${it.k}')">📷 Adicionar foto</button><div class="thumbs" id="thumbs-${it.k}"></div>`;
  }
  return `<div class="item" data-gw="${it.gw?esc(it.gw):''}"><div class="item-label">${it.label}</div>${ctrl}</div>`;
}
function setItem(k,v,btn){ state.itens[k]=v; if(btn){ const p=btn.parentElement; p.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); } }
function setGw(v,btn){ _gwVal=v; state.gateway=v; const p=btn.parentElement; p.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); applyGwVisibility(); }
function setPar(k,v,btn){ state.parecer[k]=v; const p=btn.parentElement; p.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
function applyGwVisibility(){
  document.querySelectorAll('.item[data-gw]').forEach(el=>{
    const gw=el.getAttribute('data-gw'); el.style.display = (!gw || gw===_gwVal) ? '' : 'none';
  });
}

// ══ Orçamento ══
function addOrcRow(){
  const tb=document.querySelector('#orcTable tbody');
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input type="text"></td><td><input type="number" value="1" style="width:44px" oninput="calcOrc()"></td>
    <td><input type="number" step="any" style="width:70px" oninput="calcOrc()"></td>
    <td style="text-align:center"><input type="checkbox" oninput="calcOrc()"></td><td class="rowtot">0,00</td>`;
  tb.appendChild(tr); calcOrc();
}
function calcOrc(){
  let total=0;
  document.querySelectorAll('#orcTable tbody tr').forEach(tr=>{
    const q=parseFloat(tr.children[1].querySelector('input').value)||0;
    const v=parseFloat(tr.children[2].querySelector('input').value)||0;
    const t=q*v; total+=t; tr.querySelector('.rowtot').textContent=t.toFixed(2).replace('.',',');
  });
  document.getElementById('orcTotal').textContent=total.toFixed(2).replace('.',',');
}

// ══ Fotos ══
function pickPhoto(secao){
  const inp=document.getElementById('fileInput');
  inp.onchange=e=>{ const f=e.target.files[0]; if(f) handlePhoto(secao,f); inp.value=''; };
  inp.click();
}
function handlePhoto(secao,file){
  const reader=new FileReader();
  reader.onload=()=>{ const img=new Image(); img.onload=()=>{
    let {width:w,height:h}=img; if(w>MAX_IMG_PX||h>MAX_IMG_PX){const r=Math.min(MAX_IMG_PX/w,MAX_IMG_PX/h);w=Math.round(w*r);h=Math.round(h*r);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    uploadPhoto(secao,cv.toDataURL('image/jpeg',IMG_QUALITY),file.name||'foto.jpg');
  }; img.src=reader.result; };
  reader.readAsDataURL(file);
}
async function uploadPhoto(secao,dataUrl,fileName){
  const cont=document.getElementById('thumbs-'+secao);
  const el=document.createElement('img');el.className='thumb uploading';el.src=dataUrl;cont.appendChild(el);
  state.fotos[secao]=state.fotos[secao]||[];
  try{
    const payload={action:'salvarFotoForm',os:curOs(),cliente:val('i_cliente')||'SemCliente',secao,nomeArquivo:fileName,base64:dataUrl.split(',')[1],mimeType:'image/jpeg',categoria:'foto_'+SC.tipoForm,entity_type:SC.tipoForm};
    const resp=await fetch(GAS_URL,{method:'POST',body:gcBody(payload)});
    const data=JSON.parse(await resp.text());
    if(!data||data.ok!==true) throw new Error(data.error||'falha');
    el.className='thumb ok'; state.fotos[secao].push({url:data.url,fileName,status:'ok'});
  }catch(err){ el.className='thumb erro'; state.fotos[secao].push({url:null,fileName,status:'erro'}); toast('Erro ao enviar foto'); }
}
function curOs(){ return val('i_os')||_osId||'SemOS'; }

// ══ Captura + envio ══
function captura(){
  state.identificacao={ tecnico:val('i_tecnico'),data:val('i_data'),os:val('i_os'),cliente:val('i_cliente'),
    equipamento:val('i_equip'),modelo:val('i_modelo'),horimetro:val('i_horimetro'),ano:val('i_ano') };
  SC.idExtra.forEach(f=>{ state.identificacao[f.k]=val('ix_'+f.k); });
  state.observacoes=val('o_obs');
  state.parecer.assinatura=val('p_assinatura');
  state.orcamento=[];
  document.querySelectorAll('#orcTable tbody tr').forEach(tr=>{
    state.orcamento.push({ descricao:tr.children[0].querySelector('input').value, qtd:tr.children[1].querySelector('input').value,
      vunit:tr.children[2].querySelector('input').value, mo:tr.children[3].querySelector('input').checked });
  });
  state.orcamento_validade=val('orc_validade');
  state.orcamento_total=document.getElementById('orcTotal').textContent;
}
async function enviar(){
  captura();
  const btn=document.getElementById('btnEnviar'); btn.disabled=true; btn.textContent='Enviando…';
  if(_osId && !_enviado){
    _enviado=true;
    var _sess=null;
    try{ _sess=JSON.parse(localStorage.getItem('proper_session')||'null'); }catch(e){}
    try{
      const fotosFlat=[]; Object.keys(state.fotos).forEach(k=>(state.fotos[k]||[]).forEach(f=>fotosFlat.push(Object.assign({secao:k},f))));
      const payload={action:'saveFormulario',os_id:_osId,tarefa_id:_tarefaId,tipo_formulario:SC.tipoForm,form_uid:_formUid,
        tecnico_nome:state.identificacao.tecnico||(_sess&&_sess.tecnico&&_sess.tecnico.nome)||'',
        tecnico_id:(_sess&&_sess.tecnico&&_sess.tecnico.id)||'',campos_json:state,fotos_json:fotosFlat};
      const r=await fetch(GAS_URL,{method:'POST',body:gcBody(payload)});
      const d=JSON.parse(await r.text());
      if(d.status!=='ok') throw new Error(d.message||'Erro do servidor');
    }catch(e){ _enviado=false; btn.disabled=false; btn.textContent='✓ Concluir peritagem'; toast('Erro ao enviar: ' + e.message); return; }
  }
  document.getElementById('app').style.display='none';
  const ok=document.getElementById('okScreen'); ok.style.display='';
  document.getElementById('okSub').textContent=_osId?'A tarefa foi concluída no pipeline. Gere o PDF para anexar ao orçamento.':'Fotos salvas no Drive — gere o PDF. Sem OS vinculada, os dados do formulário NÃO ficam no sistema.';
}

function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function esc(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

(function init(){
  const p=new URLSearchParams(location.search);
  const tipo=(p.get('tipo')||'09'); SC=SCHEMAS[tipo]||SCHEMAS['09'];
  _osId=p.get('os_id')||''; _tarefaId=p.get('tarefa_id')||''; window._GC=p.get('gc')||window._GC||'';
  render();
  if(p.get('cliente')) document.getElementById('i_cliente').value=p.get('cliente');
  if(p.get('os_numero')) document.getElementById('i_os').value=p.get('os_numero');
  document.getElementById('i_data').value=new Date().toISOString().slice(0,10);
  if(_osId){ const pill=document.getElementById('osPill'); pill.style.display=''; pill.textContent='OS vinculada: '+(p.get('os_numero')||_osId); }
  addOrcRow();
})();
</script>
